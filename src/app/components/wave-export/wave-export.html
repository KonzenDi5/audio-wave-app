<div class="wave-export-container">
  <h3 class="section-title">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Exportar Imagem
  </h3>

  <!-- Seletor de Estilo -->
  <div class="style-selector">
    @for (style of styles; track style.key) {
      <button
        class="style-btn"
        [class.active]="selectedStyle() === style.key"
        (click)="selectStyle(style.key)"
      >
        <span
          class="style-preview"
          [style.background]="'linear-gradient(135deg, ' + style.colors[0] + ', ' + style.colors[1] + ')'"
        ></span>
        <span class="style-label">{{ style.label }}</span>
      </button>
    }
  </div>

  <!-- Prévia -->
  @if (waveformData()) {
    <div class="preview-card">
      <canvas #previewCanvas class="preview-canvas"></canvas>
    </div>

    <p class="precision-hint">
      A imagem sai com código de leitura precisa para o scanner reconhecer e reproduzir.
    </p>
  }

  <!-- Botão de Exportar -->
  <button
    class="export-btn"
    [disabled]="!waveformData() || isExporting()"
    (click)="exportImage()"
  >
    @if (isExporting()) {
      <span class="spinner"></span>
      Gerando...
    } @else {
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Salvar Imagem
    }
  </button>
</div>
