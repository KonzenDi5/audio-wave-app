<div class="camera-page">
  <!-- Header -->
  <header class="cam-header">
    <a class="back-btn" routerLink="/">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <h2>Wave Camera</h2>
    <div class="header-spacer"></div>
  </header>

  @if (!isActive()) {
    <!-- Start Screen -->
    <div class="start-screen">
      <div class="start-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="4" stroke="#22c55e" stroke-width="1.5"/>
        </svg>
      </div>
      <h3>Visualize ondas sonoras em tempo real</h3>
      <p class="start-description">
        Use sua câmera como fundo e veja as ondas do microfone sobrepostas na tela
      </p>
      <button class="start-btn" (click)="startCamera()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Iniciar Câmera
      </button>

      @if (hasError()) {
        <p class="error-message">{{ hasError() }}</p>
      }
    </div>
  }

  @if (isActive()) {
    <!-- Camera View -->
    <div class="camera-view">
      <div class="video-container">
        <video #videoElement autoplay playsinline muted class="camera-video"></video>
        <canvas #overlayCanvas class="overlay-canvas"></canvas>
      </div>

      <!-- Mode Selector -->
      <div class="mode-bar">
        <button
          class="mode-btn"
          [class.active]="visualMode() === 'circle'"
          (click)="setVisualMode('circle')"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Circular
        </button>
        <button
          class="mode-btn"
          [class.active]="visualMode() === 'wave'"
          (click)="setVisualMode('wave')"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M2 12c2-3 4-6 6 0s4 3 6 0 4-6 6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Onda
        </button>
        <button
          class="mode-btn"
          [class.active]="visualMode() === 'bars'"
          (click)="setVisualMode('bars')"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M6 20V10M10 20V4M14 20v-6M18 20v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Barras
        </button>
      </div>

      <!-- Bottom Controls -->
      <div class="bottom-controls">
        <button class="cam-control-btn" (click)="toggleCamera()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M20 7l-5 3V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1v-3l5 3V7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M11 11l-4 4m0-4l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>

        <button class="cam-control-btn capture-btn" (click)="captureSnapshot()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="12" r="7" fill="currentColor"/>
          </svg>
        </button>

        <button class="cam-control-btn stop-cam-btn" (click)="stopCamera()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="6" y="6" width="12" height="12" rx="1" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  }
</div>
