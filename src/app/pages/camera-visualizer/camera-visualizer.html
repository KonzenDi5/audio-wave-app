<div class="camera-page">
  <header class="cam-header">
    <a class="back-btn" routerLink="/">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <h2>Wave Scanner</h2>
    <div class="header-spacer"></div>
  </header>

  <!-- Vídeo + canvas sempre no DOM -->
  <div class="camera-view" [class.hidden]="!isActive()">
    <div class="video-container">
      <video
        #videoElement
        autoplay
        playsinline
        [muted]="true"
        webkit-playsinline
        class="camera-video"
      ></video>
      <canvas #overlayCanvas class="overlay-canvas"></canvas>

      <!-- Indicador de status -->
      <div class="scan-status" [class.detected]="isDetected()">
        @if (isDetected()) {
          <span class="status-dot"></span>
          Onda detectada
        } @else {
          <span class="status-scanning"></span>
          Aponte para uma imagem de onda...
        }
      </div>
    </div>

    <!-- Controles inferiores -->
    <div class="bottom-controls">
      <button class="cam-control-btn" (click)="toggleCamera()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M16 3h5v5M8 3H3v5M16 21h5v-5M8 21H3v-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button class="cam-control-btn capture-btn" [disabled]="!isDetected()" (click)="captureSnapshot()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="7" fill="currentColor"/>
        </svg>
      </button>

      <button class="cam-control-btn stop-cam-btn" (click)="stopCamera()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="6" y="6" width="12" height="12" rx="1" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Tela inicial -->
  @if (!isActive()) {
    <div class="start-screen">
      <div class="start-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
          <path d="M1 4v16h22V4H1z" stroke="#22c55e" stroke-width="1.5"/>
          <path d="M7 12h2m2 0h2m2 0h2" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="5" stroke="#22c55e" stroke-width="1" stroke-dasharray="3 2"/>
        </svg>
      </div>
      <h3>Escaneie suas ondas sonoras</h3>
      <p class="start-description">
        Aponte a câmera para a imagem de onda gerada e veja ela sendo lida em tempo real
      </p>
      <button class="start-btn" (click)="startCamera()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Abrir Câmera
      </button>

      @if (hasError()) {
        <p class="error-message">{{ hasError() }}</p>
      }
    </div>
  }
</div>
